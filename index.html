<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeFit Pro</title>
    <style>
        :root { --bg: #121212; --accent: #ccff00; --card: #1e1e1e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .header h1 { color: var(--accent); margin: 0; font-size: 22px; letter-spacing: 1px; }
        
        .container { padding: 20px; display: none; }
        .container.active { display: block; }
        
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; }
        h3 { margin-top: 0; color: var(--accent); font-size: 16px; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .nav-item { color: #888; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: scale(1.1); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        .log-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .log-item b { color: var(--accent); }
        .water-count { font-size: 45px; text-align: center; margin: 15px 0; color: #00a2ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>PRIMEFIT PRO</h1>
    <span id="curDate" style="font-size: 11px; opacity: 0.6;"></span>
</div>

<div id="workout" class="container active">
    <div class="card">
        <h3>Log Exercise</h3>
        <input type="text" id="exName" placeholder="Exercise (e.g. Pull-ups)">
        <input type="number" id="exReps" placeholder="Reps / Count">
        <button onclick="saveWorkout()">SAVE WORKOUT</button>
    </div>
    <div class="card">
        <h3>Recent Activity</h3>
        <div id="workoutLogs"></div>
    </div>
</div>

<div id="water" class="container">
    <div class="card" style="text-align: center;">
        <h3>Water Intake</h3>
        <div class="water-count" id="waterDisplay">0 L</div>
        <p style="font-size: 14px; opacity: 0.7;">Daily Goal: 4 Liters</p>
        <button style="background: #00a2ff; color: white;" onclick="addWater()">+ ADD 0.5L WATER</button>
        <button style="background: transparent; color: #ff4444; margin-top: 15px; font-size: 12px;" onclick="resetWater()">Reset Today's Water</button>
    </div>
</div>

<div id="goals" class="container">
    <div class="card">
        <h3>My Elite Goals</h3>
        <ul style="list-style: none; padding: 0; line-height: 2;">
            <li>✅ 50 Pull-ups Daily</li>
            <li>✅ Cricket Drills: 2 Hours</li>
            <li>✅ 4L Water Intake</li>
            <li>✅ Income Tax Dept Prep</li>
        </ul>
    </div>
    <div class="card" style="text-align:center; opacity: 0.5; font-size: 12px;">
        <p>PrimeFit V2.0 | Developed by You</p>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showTab('workout', this)">
        <span class="nav-icon">🏠</span><span>Workout</span>
    </div>
    <div class="nav-item" onclick="showTab('water', this)">
        <span class="nav-icon">💧</span><span>Water</span>
    </div>
    <div class="nav-item" onclick="showTab('goals', this)">
        <span class="nav-icon">🎯</span><span>Goals</span>
    </div>
</div>

<script>
    document.getElementById('curDate').innerText = new Date().toDateString();

    function showTab(tabId, el) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    // Workout Logic (Using your original key: primefit_logs)
    let workouts = JSON.parse(localStorage.getItem('primefit_logs')) || [];
    
    function saveWorkout() {
        const name = document.getElementById('exName').value;
        const reps = document.getElementById('exReps').value;
        if(name && reps) {
            workouts.push({name: name, count: reps});
            localStorage.setItem('primefit_logs', JSON.stringify(workouts));
            renderWorkouts();
            document.getElementById('exName').value = '';
            document.getElementById('exReps').value = '';
        }
    }

    function renderWorkouts() {
        const div = document.getElementById('workoutLogs');
        if(workouts.length === 0) {
            div.innerHTML = '<p style="font-size:12px; opacity:0.5;">No workouts yet.</p>';
            return;
        }
        div.innerHTML = workouts.slice().reverse().map(w => `
            <div class="log-item">
                <span>${w.name || w.exercise}</span>
                <b>${w.count || w.reps} Reps</b>
            </div>
        `).join('');
    }

    // Water Logic
    let water = parseFloat(localStorage.getItem('primefit_water')) || 0;
    function addWater() {
        water += 0.5;
        localStorage.setItem('primefit_water', water);
        updateWaterUI();
    }
    function resetWater() { 
        if(confirm("Reset water count?")) {
            water = 0; 
            localStorage.setItem('primefit_water', 0); 
            updateWaterUI(); 
        }
    }
    function updateWaterUI() { document.getElementById('waterDisplay').innerText = water + " L"; }

    renderWorkouts();
    updateWaterUI();
</script>

</body>
</html>
